<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Critical for iOS: prevents horizontal scroll and auto-zoom on inputs -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Big 2 Scorer</title>
    <style>
        /* High contrast for long-sightedness, fluid for iPhone 17 Air */
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            padding: 10px; 
            background: #000000; 
            color: #ffffff; 
            font-size: 20px; 
            margin: 0;
        }
        .container { 
            width: 100%;
            max-width: 600px; 
            margin: auto; 
            background: #111; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid #333; 
        }
        h1 { color: #ffcc00; font-size: 36px; text-align: center; margin: 10px 0; }
        h2 { color: #4bb5ff; font-size: 28px; margin-top: 30px; border-bottom: 1px solid #333; }
        
        .setup-box { 
            background: #1a1a1a; 
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
        }
        
        /* Stacked inputs for mobile */
        .input-group { display: flex; flex-direction: column; gap: 8px; margin: 15px 0; }
        .name-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        input, select { 
            width: 100%;
            padding: 14px; 
            font-size: 22px; /* iOS won't zoom if 16px+, 22px is better for visibility */
            border-radius: 8px; 
            border: 2px solid #444; 
            background: #fff; 
            color: #000; 
            font-weight: bold;
            -webkit-appearance: none; /* Removes iOS default styling */
        }

        .player-card { 
            background: #222;
            border: 2px solid #444; 
            padding: 15px; 
            margin-bottom: 15px;
            border-radius: 10px;
        }
        .winner-card { border-color: #4caf50; background: #0e2110; }

        .row-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        button { 
            width: 100%; 
            padding: 20px; 
            font-size: 24px; 
            background: #0070f3; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            margin-top: 10px;
        }
        .secondary-btn { background: #b91c1c; margin-top: 40px; font-size: 18px; }

        /* Scrollable Ledger for mobile */
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        th, td { padding: 12px; border: 1px solid #333; text-align: center; font-size: 20px; }
        th { background: #222; color: #ffcc00; }
        .money { color: #00ff00; }
        .debt { color: #ff4d4d; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Big 2 Scorer</h1>
        <div id="session-date" style="text-align:center; color:#888; font-size:16px;">Connecting...</div>
        
        <div class="setup-box">
            <div class="input-group">
                <label>Value Per Point ($)</label>
                <input type="number" id="point_val" value="1.00" step="0.10" onchange="syncToFirebase()">
            </div>
            <div class="input-group">
                <label>Players</label>
                <div class="name-grid">
                    <input type="text" id="n1" placeholder="P1" onchange="syncToFirebase()">
                    <input type="text" id="n2" placeholder="P2" onchange="syncToFirebase()">
                    <input type="text" id="n3" placeholder="P3" onchange="syncToFirebase()">
                    <input type="text" id="n4" placeholder="P4" onchange="syncToFirebase()">
                </div>
            </div>
        </div>

        <h2>Current Hand</h2>
        <div class="input-group">
            <label>Winner</label>
            <select id="winner_idx" onchange="renderInputs()">
                <option value="0">Player 1</option>
                <option value="1">Player 2</option>
                <option value="2">Player 3</option>
                <option value="3">Player 4</option>
            </select>
        </div>
        
        <div id="player-inputs"></div>

        <button onclick="calculateHand()">SUBMIT SCORE</button>
        
        <div class="table-wrap">
            <table id="ledger">
                <thead id="ledger-head"></thead>
                <tbody id="ledger-body"></tbody>
                <tfoot id="ledger-foot"></tfoot>
            </table>
        </div>

        <button class="secondary-btn" onclick="resetSession()">RESET SESSION</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCh9aJZ_exqVOvUeWXXlxwEXONTDcK-0Pc",
            authDomain: "big-2-scorer-2d3c1.firebaseapp.com",
            databaseURL: "https://big-2-scorer-2d3c1-default-rtdb.firebaseio.com",
            projectId: "big-2-scorer-2d3c1",
            storageBucket: "big-2-scorer-2d3c1.firebasestorage.app",
            messagingSenderId: "412428402739",
            appId: "1:412428402739:web:329f77526f9dbeb61aa346"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const sessionRef = ref(db, 'current_session');

        let sessionData = {
            startTime: new Date().toLocaleString(),
            pointValue: 1.0,
            names: ["P1", "P2", "P3", "P4"],
            totals: [0, 0, 0, 0],
            history: []
        };

        window.renderInputs = function() {
            const winIdx = parseInt(document.getElementById('winner_idx').value);
            let html = "";
            for(let i=0; i<4; i++) {
                const isWin = i === winIdx;
                html += `
                <div class="player-card ${isWin ? 'winner-card' : ''}">
                    <strong>${sessionData.names[i]} ${isWin ? '🏆' : ''}</strong>
                    <div class="row-inputs">
                        <div>
                            <label style="font-size:14px">${isWin ? 'End 2s' : 'Cards'}</label>
                            <input type="number" id="p${i}_${isWin ? 'w_twos' : 'cards'}" value="0">
                        </div>
                        <div>
                            <label style="font-size:14px">Held 2s</label>
                            <input type="number" id="p${i}_twos" value="0">
                        </div>
                    </div>
                    <div style="margin-top:10px">
                        <label style="font-size:14px">Bonus</label>
                        <select id="p${i}_special">
                            <option value="0">None</option>
                            <option value="5">SF/4K (+5)</option>
                            <option value="10">Royal (+10)</option>
                        </select>
                    </div>
                </div>`;
            }
            document.getElementById('player-inputs').innerHTML = html;
        };

        onValue(sessionRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                sessionData = data;
                document.getElementById('point_val').value = sessionData.pointValue;
                sessionData.names.forEach((n, i) => { document.getElementById('n' + (i + 1)).value = n; });
                document.getElementById('session-date').innerText = "Started: " + sessionData.startTime;
            }
            updateLedgerUI();
            renderInputs();
        });

        window.syncToFirebase = function() {
            sessionData.pointValue = parseFloat(document.getElementById('point_val').value) || 1.0;
            for(let i=0; i<4; i++) {
                sessionData.names[i] = document.getElementById('n' + (i+1)).value || "P" + (i+1);
            }
            set(sessionRef, sessionData);
        };

        window.calculateHand = function() {
            const winIdx = parseInt(document.getElementById('winner_idx').value);
            let handPoints = [0, 0, 0, 0];
            let cards = [0, 0, 0, 0], twos = [0, 0, 0, 0], specials = [0, 0, 0, 0];

            for(let i=0; i<4; i++) {
                twos[i] = parseInt(document.getElementById(`p${i}_twos`).value) || 0;
                specials[i] = parseInt(document.getElementById(`p${i}_special`).value) || 0;
                if (i !== winIdx) cards[i] = parseInt(document.getElementById(`p${i}_cards`).value) || 0;
            }

            const winTwosBonus = (parseInt(document.getElementById(`p${winIdx}_w_twos`).value) || 0) * 5;

            for(let i=0; i<4; i++) {
                if(i !== winIdx) {
                    let penalty = 5 + winTwosBonus + (twos[i] * 5);
                    handPoints[i] -= penalty;
                    handPoints[winIdx] += penalty;
                }
            }

            for(let i=0; i<4; i++) {
                for(let j=0; j<4; j++) {
                    if(cards[i] > cards[j]) {
                        let diff = cards[i] - cards[j];
                        handPoints[i] -= diff;
                        handPoints[j] += diff;
                    }
                }
            }

            specials.forEach((pts, idx) => {
                if(pts > 0) {
                    for(let i=0; i<4; i++) {
                        if(i !== idx) { handPoints[i] -= pts; handPoints[idx] += pts; }
                    }
                }
            });

            if (!sessionData.history) sessionData.history = [];
            sessionData.history.push(handPoints);
            handPoints.forEach((pts, i) => sessionData.totals[i] += pts);
            set(sessionRef, sessionData);
        };

        function updateLedgerUI() {
            let head = `<tr><th>#</th>`;
            sessionData.names.forEach(n => head += `<th>${n.substring(0,3)}</th>`);
            document.getElementById('ledger-head').innerHTML = head + `</tr>`;

            let bodyHtml = "";
            if (sessionData.history) {
                sessionData.history.forEach((hand, idx) => {
                    bodyHtml += `<tr><td>${idx+1}</td>`;
                    hand.forEach(pts => {
                        let val = (pts * sessionData.pointValue).toFixed(2);
                        bodyHtml += `<td class="${pts >= 0 ? 'money' : 'debt'}">${pts >= 0 ? '+' : ''}${val}</td>`;
                    });
                    bodyHtml += `</tr>`;
                });
            }
            document.getElementById('ledger-body').innerHTML = bodyHtml;

            let foot = `<tr><td><strong>Total</strong></td>`;
            sessionData.totals.forEach(t => {
                let val = (t * sessionData.pointValue).toFixed(2);
                foot += `<td class="${t >= 0 ? 'money' : 'debt'}"><strong>${val}</strong></td>`;
            });
            document.getElementById('ledger-foot').innerHTML = foot + `</tr>`;
        }

        window.resetSession = function() {
            if(confirm("Wipe all data?")) set(sessionRef, null).then(() => location.reload());
        };

        renderInputs();
        updateLedgerUI();
    </script>
</body>
</html>
