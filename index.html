<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Big 2</title>
    <link rel="apple-touch-icon" href="https://img.freepik.com/premium-vector/two-spades-playing-card-isolated-black-background_1029473-58133.jpg?w=360">
    <meta name="apple-mobile-web-app-title" content="Big 2">
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; padding: 10px; background: #000; color: #fff; margin: 0; font-size: 16px; }
        .container { max-width: 500px; margin: auto; background: #111; padding: 12px; border-radius: 12px; border: 1px solid #333; }
        h1 { color: #ffcc00; font-size: 28px; text-align: center; margin: 5px 0; }
        
        .history-box { margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 10px; display: flex; gap: 5px; flex-direction: column; }
        .history-box label { font-size: 12px; color: #888; }
        
        .setup-row { display: grid; grid-template-columns: 1fr 2fr; gap: 8px; margin-bottom: 10px; background: #1a1a1a; padding: 8px; border-radius: 8px; }
        .name-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        
        input, select { 
            width: 100%; padding: 8px; font-size: 16px; border-radius: 6px; 
            border: 1px solid #444; background: #fff; color: #000; font-weight: bold;
        }

        #player-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .player-card { background: #222; border: 1px solid #444; padding: 8px; border-radius: 8px; }
        .winner-card { border-color: #4caf50; background: #0e2110; }
        .player-card strong { font-size: 14px; display: block; margin-bottom: 5px; color: #ffcc00; }
        .card-row { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 5px; }
        .card-row label { font-size: 10px; color: #aaa; display: block; }
        .card-row input { padding: 5px; font-size: 14px; }
        .special-select { font-size: 12px; padding: 4px; background: #eee; }

        button { 
            width: 100%; padding: 15px; font-size: 20px; background: #0070f3; 
            color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px;
        }
        .secondary-btn { background: #b91c1c; margin-top: 20px; font-size: 14px; padding: 10px; }

        .table-wrap { overflow-x: auto; margin-top: 15px; background: #000; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 6px; border: 1px solid #333; text-align: center; }
        th { background: #222; color: #ffcc00; }
        .money { color: #00ff00; } .debt { color: #ff4d4d; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Big 2</h1>

        <div class="history-box">
            <label>Select Session Date</label>
            <input type="date" id="date-picker" onchange="loadDateSession()">
        </div>
        
        <div class="setup-row">
            <div>
                <label style="font-size:10px">$/Point</label>
                <input type="number" id="point_val" value="1.00" step="0.10" onchange="syncToFirebase()">
            </div>
            <div class="name-grid">
                <input type="text" id="n1" placeholder="P1" oninput="syncToFirebase()">
                <input type="text" id="n2" placeholder="P2" oninput="syncToFirebase()">
                <input type="text" id="n3" placeholder="P3" oninput="syncToFirebase()">
                <input type="text" id="n4" placeholder="P4" oninput="syncToFirebase()">
            </div>
        </div>

        <div style="display:flex; justify-content: space-between; align-items: center;">
            <span style="font-size:14px; color:#4bb5ff">Winner:</span>
            <select id="winner_idx" style="width:60%; padding:5px" onchange="renderInputs()">
            </select>
        </div>
        
        <div id="player-inputs"></div>
        <button onclick="calculateHand()">SUBMIT SCORE</button>
        
        <div class="table-wrap">
            <table id="ledger">
                <thead id="ledger-head"></thead>
                <tbody id="ledger-body"></tbody>
                <tfoot id="ledger-foot"></tfoot>
            </table>
        </div>
        <button class="secondary-btn" onclick="resetCurrentSession()">RESET SESSION</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCh9aJZ_exqVOvUeWXXlxwEXONTDcK-0Pc",
            authDomain: "big-2-scorer-2d3c1.firebaseapp.com",
            databaseURL: "https://big-2-scorer-2d3c1-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "big-2-scorer-2d3c1",
            storageBucket: "big-2-scorer-2d3c1.firebasestorage.app",
            messagingSenderId: "412428402739",
            appId: "1:412428402739:web:329f77526f9dbeb61aa346"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date-picker').value = today;

        let sessionData = { pointValue: 1.0, names: ["P1", "P2", "P3", "P4"], totals: [0,0,0,0], history: [] };

        window.loadDateSession = function() {
            const selectedDate = document.getElementById('date-picker').value;
            onValue(ref(db, 'sessions/' + selectedDate), (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    sessionData = data;
                } else {
                    sessionData = { pointValue: 1.0, names: ["P1", "P2", "P3", "P4"], totals: [0,0,0,0], history: [] };
                }
                updateUIFields();
            }, { onlyOnce: true });
        };

        function updateUIFields() {
            document.getElementById('point_val').value = sessionData.pointValue;
            sessionData.names.forEach((n, i) => document.getElementById('n' + (i + 1)).value = n);
            
            const winSelect = document.getElementById('winner_idx');
            const currentWinIdx = winSelect.value || 0;
            winSelect.innerHTML = sessionData.names.map((n, i) => `<option value="${i}">${n}</option>`).join('');
            winSelect.value = currentWinIdx;

            updateLedgerUI();
            renderInputs();
        }

        window.renderInputs = function() {
            const winIdx = parseInt(document.getElementById('winner_idx').value) || 0;
            let html = "";
            for(let i=0; i<4; i++) {
                const isWin = i === winIdx;
                // Preserve current values if they exist
                const oldVal = document.getElementById(`p${i}_val`)?.value || 0;
                const oldTwos = document.getElementById(`p${i}_twos`)?.value || 0;
                const oldSpec = document.getElementById(`p${i}_special`)?.value || 0;

                html += `
                <div class="player-card ${isWin ? 'winner-card' : ''}">
                    <strong>${sessionData.names[i]} ${isWin ? '🏆' : ''}</strong>
                    <div class="card-row">
                        <div><label>${isWin ? 'End 2s' : 'Cards'}</label><input type="number" id="p${i}_val" value="${oldVal}"></div>
                        <div><label>Held 2s</label><input type="number" id="p${i}_twos" value="${oldTwos}"></div>
                    </div>
                    <label style="font-size:10px; color:#aaa">Special Hand</label>
                    <select id="p${i}_special" class="special-select">
                        <option value="0" ${oldSpec == 0 ? 'selected' : ''}>None</option>
                        <option value="5" ${oldSpec == 5 ? 'selected' : ''}>SF / 4-Kind (+5)</option>
                        <option value="10" ${oldSpec == 10 ? 'selected' : ''}>Royal Flush (+10)</option>
                    </select>
                </div>`;
            }
            document.getElementById('player-inputs').innerHTML = html;
        };

        window.syncToFirebase = function() {
            const selectedDate = document.getElementById('date-picker').value;
            sessionData.pointValue = parseFloat(document.getElementById('point_val').value) || 1.0;
            for(let i=0; i<4; i++) {
                sessionData.names[i] = document.getElementById('n' + (i+1)).value || "P" + (i+1);
            }
            
            const winSelect = document.getElementById('winner_idx');
            const currentVal = winSelect.value;
            winSelect.innerHTML = sessionData.names.map((n, i) => `<option value="${i}">${n}</option>`).join('');
            winSelect.value = currentVal;
            
            // KEY FIX: Update the player cards immediately
            renderInputs();
            
            set(ref(db, 'sessions/' + selectedDate), sessionData);
            updateLedgerUI();
        };

        window.calculateHand = function() {
            const winIdx = parseInt(document.getElementById('winner_idx').value);
            let handPoints = [0, 0, 0, 0];
            const winTwosBonus = (parseInt(document.getElementById(`p${winIdx}_val`).value) || 0) * 5;

            for(let i=0; i<4; i++) {
                if(i !== winIdx) {
                    let twos = parseInt(document.getElementById(`p${i}_twos`).value) || 0;
                    let penalty = 5 + winTwosBonus + (twos * 5);
                    handPoints[i] -= penalty;
                    handPoints[winIdx] += penalty;
                }
            }

            let cards = [0,0,0,0];
            for(let i=0; i<4; i++) {
                if(i !== winIdx) cards[i] = parseInt(document.getElementById(`p${i}_val`).value) || 0;
            }
            for(let i=0; i<4; i++) {
                for(let j=0; j<4; j++) {
                    if(cards[i] > cards[j]) {
                        let diff = cards[i] - cards[j];
                        handPoints[i] -= diff;
                        handPoints[j] += diff;
                    }
                }
            }

            for(let i=0; i<4; i++) {
                let specVal = parseInt(document.getElementById(`p${i}_special`).value) || 0;
                if(specVal > 0) {
                    for(let j=0; j<4; j++) {
                        if(i !== j) { handPoints[j] -= specVal; handPoints[i] += specVal; }
                    }
                }
            }

            if(!sessionData.history) sessionData.history = [];
            sessionData.history.push(handPoints);
            handPoints.forEach((pts, i) => sessionData.totals[i] += pts);
            syncToFirebase();
        };

        function updateLedgerUI() {
            let head = `<tr><th>#</th>` + sessionData.names.map(n => `<th>${n.substring(0,3)}</th>`).join('') + `</tr>`;
            document.getElementById('ledger-head').innerHTML = head;
            document.getElementById('ledger-body').innerHTML = (sessionData.history || []).map((hand, idx) => 
                `<tr><td>${idx+1}</td>` + hand.map(pts => `<td class="${pts >= 0 ? 'money' : 'debt'}">${(pts * sessionData.pointValue).toFixed(1)}</td>`).join('') + `</tr>`
            ).join('');
            document.getElementById('ledger-foot').innerHTML = `<tr><td><strong>Σ</strong></td>` + sessionData.totals.map(t => `<td class="${t >= 0 ? 'money' : 'debt'}"><strong>${(t * sessionData.pointValue).toFixed(1)}</strong></td>`).join('') + `</tr>`;
        }

        window.resetCurrentSession = function() {
            if(confirm("Clear this day's session?")) {
                sessionData.history = [];
                sessionData.totals = [0,0,0,0];
                syncToFirebase();
            }
        };

        loadDateSession();
    </script>
</body>
</html>
