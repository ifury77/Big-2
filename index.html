<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Big 2 Live Session</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #121212; color: #e0e0e0; }
        .container { max-width: 800px; margin: auto; background: #1e1e1e; padding: 25px; border-radius: 12px; border: 1px solid #333; }
        h1, h2 { text-align: center; color: #4bb5ff; margin-bottom: 5px; }
        .timestamp { text-align: center; font-size: 0.8em; color: #777; margin-bottom: 20px; }
        .setup-box { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }
        .player-row { border-bottom: 1px solid #333; padding: 15px 0; }
        .input-group { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; }
        input, select { padding: 8px; border-radius: 5px; border: 1px solid #444; background: #2a2a2a; color: white; }
        .card-input { width: 60px; }
        .name-input { width: 120px; }
        button { width: 100%; padding: 12px; background: #0070f3; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .secondary-btn { background: #b91c1c; margin-top: 20px; }
        #ledger { margin-top: 25px; width: 100%; border-collapse: collapse; font-size: 0.9em; }
        #ledger th, #ledger td { padding: 10px; border: 1px solid #333; text-align: center; }
        .money { color: #4caf50; font-weight: bold; }
        .debt { color: #f44336; font-weight: bold; }
        .winner-row { background: rgba(75, 181, 255, 0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Big 2 Live Session</h1>
        <div id="session-date" class="timestamp">Initializing...</div>
        
        <div class="setup-box">
            <div class="input-group">
                Value per Point ($): <input type="number" id="point_val" value="1.00" step="0.10" onchange="syncToFirebase()">
            </div>
            <div class="input-group">
                Names: 
                <input type="text" id="n1" class="name-input" placeholder="P1" onchange="syncToFirebase()">
                <input type="text" id="n2" class="name-input" placeholder="P2" onchange="syncToFirebase()">
                <input type="text" id="n3" class="name-input" placeholder="P3" onchange="syncToFirebase()">
                <input type="text" id="n4" class="name-input" placeholder="P4" onchange="syncToFirebase()">
            </div>
        </div>

        <div id="game-input">
            <h2>Current Hand</h2>
            <div class="input-group">
                <strong>Who Won?</strong>
                <select id="winner_idx" onchange="renderInputs()">
                    <option value="0">Player 1</option>
                    <option value="1">Player 2</option>
                    <option value="2">Player 3</option>
                    <option value="3">Player 4</option>
                </select>
            </div>
            <div id="player-inputs"></div>
        </div>

        <button onclick="calculateHand()">Submit Hand to Cloud</button>
        
        <div id="session-summary">
            <h2>Live Ledger</h2>
            <table id="ledger">
                <thead id="ledger-head"></thead>
                <tbody id="ledger-body"></tbody>
                <tfoot id="ledger-foot"></tfoot>
            </table>
            <button class="secondary-btn" onclick="resetSession()">Permanently Clear Session</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCh9aJZ_exqVOvUeWXXlxwEXONTDcK-0Pc",
            authDomain: "big-2-scorer-2d3c1.firebaseapp.com",
            // Make sure this URL matches your Firebase console exactly!
            databaseURL: "https://big-2-scorer-2d3c1-default-rtdb.firebaseio.com",
            projectId: "big-2-scorer-2d3c1",
            storageBucket: "big-2-scorer-2d3c1.firebasestorage.app",
            messagingSenderId: "412428402739",
            appId: "1:412428402739:web:329f77526f9dbeb61aa346"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const sessionRef = ref(db, 'current_session');

        let sessionData = {
            startTime: new Date().toLocaleString(),
            pointValue: 1.0,
            names: ["Player 1", "Player 2", "Player 3", "Player 4"],
            totals: [0, 0, 0, 0],
            history: []
        };

        // UI RENDERER
        window.renderInputs = function() {
            const winIdx = parseInt(document.getElementById('winner_idx').value);
            let html = "";
            for(let i=0; i<4; i++) {
                const isWinner = i === winIdx;
                html += `
                <div class="player-row ${isWinner ? 'winner-row' : ''}">
                    <strong>${sessionData.names[i]} ${isWinner ? '(Winner)' : ''}</strong>
                    <div class="input-group">
                        ${!isWinner ? `Cards: <input type="number" id="p${i}_cards" class="card-input" value="0">` : `Ending 2s: <input type="number" id="p${i}_w_twos" class="card-input" value="0">`}
                        2s Held: <input type="number" id="p${i}_twos" class="card-input" value="0">
                        Bonus: <select id="p${i}_special">
                            <option value="0">None</option>
                            <option value="5">SF/4K (+5)</option>
                            <option value="10">Royal (+10)</option>
                        </select>
                    </div>
                </div>`;
            }
            document.getElementById('player-inputs').innerHTML = html;
        };

        // FIREBASE SYNC
        onValue(sessionRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                sessionData = data;
                document.getElementById('point_val').value = sessionData.pointValue;
                sessionData.names.forEach((name, i) => {
                    document.getElementById('n' + (i + 1)).value = name;
                });
                document.getElementById('session-date').innerText = "Session Started: " + sessionData.startTime;
            }
            updateLedgerUI();
            renderInputs();
        });

        window.syncToFirebase = function() {
            sessionData.pointValue = parseFloat(document.getElementById('point_val').value) || 1.0;
            for(let i=0; i<4; i++) {
                sessionData.names[i] = document.getElementById('n' + (i+1)).value || "Player " + (i+1);
            }
            set(sessionRef, sessionData);
        };

        window.calculateHand = function() {
            const winIdx = parseInt(document.getElementById('winner_idx').value);
            let handPoints = [0, 0, 0, 0];
            let cards = [0, 0, 0, 0];
            let twos = [0, 0, 0, 0];
            let specials = [0, 0, 0, 0];

            for(let i=0; i<4; i++) {
                twos[i] = parseInt(document.getElementById(`p${i}_twos`).value) || 0;
                specials[i] = parseInt(document.getElementById(`p${i}_special`).value) || 0;
                if (i !== winIdx) cards[i] = parseInt(document.getElementById(`p${i}_cards`).value) || 0;
            }

            const winTwosBonus = (parseInt(document.getElementById(`p${winIdx}_w_twos`).value) || 0) * 5;

            for(let i=0; i<4; i++) {
                if(i !== winIdx) {
                    let penalty = 5 + winTwosBonus + (twos[i] * 5);
                    handPoints[i] -= penalty;
                    handPoints[winIdx] += penalty;
                }
            }

            for(let i=0; i<4; i++) {
                for(let j=0; j<4; j++) {
                    if(cards[i] > cards[j]) {
                        let diff = cards[i] - cards[j];
                        handPoints[i] -= diff;
                        handPoints[j] += diff;
                    }
                }
            }

            specials.forEach((pts, idx) => {
                if(pts > 0) {
                    for(let i=0; i<4; i++) {
                        if(i !== idx) { handPoints[i] -= pts; handPoints[idx] += pts; }
                    }
                }
            });

            if (!sessionData.history) sessionData.history = [];
            sessionData.history.push(handPoints);
            handPoints.forEach((pts, i) => sessionData.totals[i] += pts);
            set(sessionRef, sessionData);
        };

        function updateLedgerUI() {
            let head = `<tr><th>Hand</th>`;
            sessionData.names.forEach(n => head += `<th>${n}</th>`);
            document.getElementById('ledger-head').innerHTML = head + `</tr>`;

            let bodyHtml = "";
            if (sessionData.history) {
                sessionData.history.forEach((hand, idx) => {
                    bodyHtml += `<tr><td>#${idx+1}</td>`;
                    hand.forEach(pts => {
                        let val = (pts * sessionData.pointValue).toFixed(2);
                        bodyHtml += `<td class="${pts >= 0 ? 'money' : 'debt'}">$${val}</td>`;
                    });
                    bodyHtml += `</tr>`;
                });
            }
            document.getElementById('ledger-body').innerHTML = bodyHtml;

            let foot = `<tr><td><strong>Total</strong></td>`;
            sessionData.totals.forEach(t => {
                let val = (t * sessionData.pointValue).toFixed(2);
                foot += `<td class="${t >= 0 ? 'money' : 'debt'}"><strong>$${val}</strong></td>`;
            });
            document.getElementById('ledger-foot').innerHTML = foot + `</tr>`;
        }

        window.resetSession = function() {
            if(confirm("Wipe Cloud Session?")) {
                set(sessionRef, null).then(() => location.reload());
            }
        };

        // Start UI immediately
        renderInputs();
        updateLedgerUI();
    </script>
</body>
</html>
